<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      font-size: 13px;
      padding: 16px;
      background: #f4f6f8;
    }
    h3 { color: #1a3c5e; margin-bottom: 12px; }
    input[type=file] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 12px;
      background: #fff;
    }
    button {
      padding: 8px 24px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #0d47a1; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #msg {
      margin-top: 14px;
      white-space: pre-wrap;
      font-size: 12px;
      color: #333;
      line-height: 1.6;
    }
    .err { color: #c62828; }
    .ok  { color: #2e7d32; }
  </style>
</head>
<body>
  <h3>📂 CSV 예약 가져오기</h3>
  <input type="file" id="csvFile" accept=".csv">
  <button id="btnImport" onclick="doImport()">가져오기</button>
  <div id="msg"></div>

  <script>
    function doImport() {
      var f = document.getElementById('csvFile').files[0];
      if (!f) {
        document.getElementById('msg').textContent = '⚠️ 파일을 먼저 선택하세요.';
        return;
      }
      var btn = document.getElementById('btnImport');
      btn.disabled = true;
      btn.textContent = '⏳ 처리 중...';
      document.getElementById('msg').textContent = '';

      var reader = new FileReader();
      reader.onload = function(e) {
        google.script.run
          .withSuccessHandler(function(res) {
            var d = document.getElementById('msg');
            d.textContent = res.message;
            d.className   = 'ok';
            btn.disabled  = false;
            btn.textContent = '가져오기';
          })
          .withFailureHandler(function(err) {
            var d = document.getElementById('msg');
            d.textContent = '❌ 오류: ' + err.message;
            d.className   = 'err';
            btn.disabled  = false;
            btn.textContent = '가져오기';
          })
          .importReservationsFromCsv(e.target.result);
      };
      reader.readAsText(f, 'EUC-KR'); // ✅ 한글 인코딩
    }
  </script>
</body>
</html>
